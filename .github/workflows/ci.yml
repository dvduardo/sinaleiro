name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      # tsc --noEmit + vite build; o smoke de paridade não roda aqui porque
      # o CI não tem saves (ele pularia silenciosamente)
      - run: npm run build
        working-directory: web
